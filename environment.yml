name: satdatakit
# Author: Rafael Cañete Vazquez

channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - gdal=3.8
  - rasterio=1.3
  - xarray=2024.1
  - rioxarray=0.15
  - netcdf4=1.6
  - h5py=3.10
  - geopandas=0.14
  - shapely=2.0
  - pyproj=3.6
  - numpy=1.26
  - pandas=2.1
  - matplotlib=3.8
  - jupyterlab=4.0
  - pytest=7.4
  - black=23.12
  - ruff=0.1
  - mypy=1.7
  - pip:
    - python-dateutil>=2.8.0
    - typing-extensions>=4.0.0
    - -e .[dev]
