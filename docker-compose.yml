version: "3.9"
# SatDataKit Docker Compose
# Author: Rafael Cañete Vazquez

services:
  satdatakit:
    build: .
    container_name: satdatakit-dev
    ports:
      - "8888:8888"
    volumes:
      - .:/workspace
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
